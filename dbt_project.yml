name: 'tpch_analytics'
version: '1.0.0'
config-version: 2

dbt-cloud:
    project-id: 516817

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  tpch_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

vars:
  dbt_project_evaluator:
    # Evaluator results will land in the default target schema + _evaluator suffix
    # e.g. tpch_analytics_evaluator — confirm after first run
    coverage_warn_count: 0
    documentation_coverage_target: 80
    test_coverage_target: 80
