models:
  - name: fct_orders
    description: >
      Order-grain fact table with aggregated line item metrics.
      Primary performance-agent target due to deep lineage and large aggregation.
    columns:
      - name: order_key
        description: Primary key for orders.
        data_tests:
          - unique
          - not_null

  - name: fct_order_items
    description: >
      Line item-grain fact table with full order and product context.
      Incremental model using merge strategy on order_key + line_number.
    columns:
      - name: order_key
        description: Order key, part of composite primary key.
        data_tests:
          - not_null
      - name: line_number
        description: Line number within the order, part of composite primary key.
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_key
              - line_number

  - name: dim_customers
    description: >
      Customer dimension with lifetime metrics including total orders,
      lifetime revenue, and first/most recent order dates.
    columns:
      - name: customer_key
        description: Primary key for customers.
        data_tests:
          - unique
          - not_null

  - name: dim_parts
    description: >
      Part dimension with supply chain summary including supplier count,
      average/min supply cost, and total available quantity.
    columns:
      - name: part_key
        description: Primary key for parts.
        data_tests:
          - unique
          - not_null
