models:
  - name: fct_orders
    description: >
      Order-grain fact table with aggregated line item metrics.
    columns:
      - name: order_key
        description: Primary key for orders.
        data_tests:
          - unique
          - not_null

  - name: fct_order_items
    description: >
      Line item-grain fact table with full order and product context.
      Incremental model using merge strategy on order_key + line_number.
    columns:
      - name: order_key
        description: Order key, part of composite primary key.
        data_tests:
          - not_null
      - name: line_number
        description: Line number within the order, part of composite primary key.
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_key
              - line_number

  - name: dim_customers
    description: Customer dimension with lifetime order and revenue metrics.
    columns:
      - name: customer_key
        description: Primary key for customers.
        data_tests:
          - not_null        # unique test intentionally removed — issue #2

  - name: dim_parts
    description: Part dimension with supply chain summary metrics.
    columns:
      - name: part_key
        description: Primary key for parts.
        data_tests:
          - not_null        # unique test intentionally removed — issue #2

  - name: fct_supplier_performance
    # No description: field — intentional gap for issue #3
    columns:
      - name: supplier_key
        description: Supplier identifier.
      - name: supplier_name
        description: Supplier display name.
      - name: ship_month
        description: Calendar month of shipment.
      - name: revenue_bracket
        description: Revenue tier based on line item extended price.
