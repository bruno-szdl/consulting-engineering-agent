models:
  - name: stg_tpch__customers
    description: Staged customer data from TPC-H benchmark.
    columns:
      - name: customer_key
        description: Primary key for customers.
        data_tests:
          - unique
          - not_null

  - name: stg_tpch__orders
    description: Staged order data from TPC-H benchmark.
    columns:
      - name: order_key
        description: Primary key for orders.
        data_tests:
          - unique
          - not_null
      - name: customer_key
        description: Foreign key to customers.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__customers')
                field: customer_key

  - name: stg_tpch__line_items
    description: Staged line item data from TPC-H benchmark.
    columns:
      - name: order_key
        description: Foreign key to orders.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__orders')
                field: order_key
      - name: line_number
        description: Line number within the order.
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_key
              - line_number

  - name: stg_tpch__nations
    description: Staged nation data from TPC-H benchmark.
    columns:
      - name: nation_key
        description: Primary key for nations.
        data_tests:
          - unique
          - not_null

  - name: stg_tpch__regions
    description: Staged region data from TPC-H benchmark.
    columns:
      - name: region_key
        description: Primary key for regions.
        data_tests:
          - unique
          - not_null

  - name: stg_tpch__parts
    description: Staged part data from TPC-H benchmark.
    columns:
      - name: part_key
        description: Primary key for parts.
        data_tests:
          - unique
          - not_null

  - name: stg_tpch__suppliers
    description: Staged supplier data from TPC-H benchmark.
    columns:
      - name: supplier_key
        description: Primary key for suppliers.
        data_tests:
          - unique
          - not_null
      - name: nation_key
        description: Foreign key to nations.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__nations')
                field: nation_key

  - name: stg_tpch__part_suppliers
    description: Staged part-supplier relationship data from TPC-H benchmark.
    columns:
      - name: part_key
        description: Part key, part of composite primary key.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__parts')
                field: part_key
      - name: supplier_key
        description: Supplier key, part of composite primary key.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__suppliers')
                field: supplier_key
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - part_key
              - supplier_key
